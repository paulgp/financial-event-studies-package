name: R-CMD-check
on:
  push:
    branches: [main]
  pull_request:

env:
  # pak resolves the GitHub-only synthdid dependency; without a token it uses
  # a shared bundled PAT that gets rate-limited
  GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: r/feventr
          # synthdid (Suggests) is GitHub-only, not on CRAN
          extra-packages: |
            any::rcmdcheck
            github::synth-inference/synthdid
          needs: check
      - uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: r/feventr
          # plot snapshots are rendered on the maintainer's macOS box and the
          # test file skips itself on CI; everything else runs everywhere
          args: 'c("--no-manual", "--as-cran")'
